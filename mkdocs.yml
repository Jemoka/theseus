site_name: theseus
site_description: Train, evaluate, and dispatch language model jobs with minimal boilerplate.
site_dir: site
docs_dir: docs

theme:
  name: material
  font: false
  palette:
    - scheme: default
      primary: custom
      accent: custom
  features:
    - navigation.sections
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

extra:
  generator: false

extra_css:
  - assets/theseus.css

plugins:
  - search
  - gen-files:
      scripts:
        - docs/gen_ref_pages.py
  - literate-nav:
      nav_file: SUMMARY.md
  - section-index
  - mkdocstrings:
      handlers:
        python:
          paths:
            - .
          options:
            show_root_heading: true
            show_root_toc_entry: false
            show_root_full_path: false
            show_source: false
            show_signature_annotations: true
            merge_init_into_class: true
            members_order: source
            docstring_style: google

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.highlight:
      anchor_linenums: true
      pygments_lang_class: true
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - pymdownx.keys

nav:
  - Getting Started: index.md
  - Tutorials:
    - Overview: Tutorials/index.md
    - Running Experiments:
      - Overview: Tutorials/running.md
      - Local: Tutorials/running-local.md
      - Remote (SSH & SLURM): Tutorials/running-remote.md
      - Remote (Volcano / K8s): Tutorials/volcano.md
      - Remote (TPU): Tutorials/tpu.md
      - Interactive REPL: Tutorials/running-repl.md
    - Adding Things:
      - Overview: Tutorials/adding.md
      - Model: Tutorials/adding-model.md
      - Experiment: Tutorials/adding-experiment.md
      - Dataset: Tutorials/adding-dataset.md
      - Evaluation: Tutorials/adding-evaluation.md
  - Design:
    - Overview: Design/index.md
    - Dispatch Infrastructure: Design/dispatch.md
    - Config System: Design/config.md
    - Mock System: Design/mock.md
    - Plot System: Design/plot.md
  - Reference: Reference/
