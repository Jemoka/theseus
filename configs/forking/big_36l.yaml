# uv run theseus submit fork_big_36l ./configs/forking/big_36l.yaml -n 4 --chip a100-sxm4-80gb --mem 128G -p scratchbubbles -g reproduction

architecture:
  rope: true
  n_layers: 36
  n_embd: 2048
  n_head: 16
  block_size: 512
  max_block_size: 1024
  dropout: 0.0
  vocab_size: 100288
  fork:
  - 2
  - 5
  - 8
  bias: true
  use_fork_channel: true
  vram_calib_factor: 1.0
eval:
  evaluations: ["blimp"]
optimization:
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  lr: 0.0003
training:
  batch_size: 512
  per_device_batch_size: -1
  tokens: 36000000000
  warmup_pct: 0.01
  decay_pct: 0.1
  validation: true
  evaluate: false
  dataset:
  - name: fineweb
    rate: 1.0
    style: PMD
    suffix: ''
  validation_steps: 2048
logging:
  report_interval: 32
  checkpoint_interval: 16384
  validation_interval: 2048
  wandb: true
request:
  n_shards: 1
job: thoughtbubbles/train/pretrain
