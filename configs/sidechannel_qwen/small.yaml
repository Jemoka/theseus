architecture:
  backbone:
    implementation: sidechannel_qwen
    weights: Qwen/Qwen2.5-0.5B-Instruct
  dtype:
    param: float32
    activation: bfloat16
  block_size: 512
eval:
  evaluations:
  - blimp
tokenizer:
  backend: huggingface
  name: Qwen/Qwen2.5-0.5B-Instruct
  huggingface:
    use_fast: true
    use_remote_code: false
optimization:
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  lr: 0.0003
  warmup_pct: 0.005
  decay_pct: 0.01
training:
  batch_size: 512
  per_device_batch_size: -1
  tokens: 40000000000
  warmup_pct: 0.01
  decay_pct: 0.1
  validation: true
  evaluate: false
  dataset:
  - name: fineweb
    rate: 1.0
    style: PMD
    suffix: ''
  validation_steps: 2048
logging:
  report_interval: 32
  checkpoint_interval: 16384
  validation_interval: 2048
  wandb: true
job: sidechannel_qwen/train/finetune
