architecture:
  dtype:
    param: float32
    activation: bfloat16
  n_embd: 64
  n_layers: 2
  bias: true
  dropout: 0.0
  n_head: 4
  block_size: 16
  rope: true
  vocab_size: 67
  layer_norm_eps: 1.0e-05
  intermediate_size: -1
eval:
  evaluations: []
tokenizer:
  backend: trivial
  name: trivial
  huggingface:
    use_fast: true
    use_remote_code: false
logging:
  plots:
    save: false
  report_interval: 1
  checkpoint_interval: 999999
  validation_interval: 999999
  wandb: false
optimization:
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  lr: 0.0003
  warmup_pct: 0.005
  decay_pct: 0.01
training:
  batch_size: 4
  per_device_batch_size: -1
  tokens: 1024
  warmup_pct: 0.01
  decay_pct: 0.1
  validation: false
  evaluate: false
  dataset:
  - name: dictlearn_16_v32
    rate: 1.0
    style: PMD
    suffix: ''
  validation_steps: 0
job: gpt/train/pretrain
request:
  n_shards: 1
