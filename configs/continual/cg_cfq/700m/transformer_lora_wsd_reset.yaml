architecture:
  dtype:
    param: float32
    activation: bfloat16
  rope: true
  vocab_size: 100288
  dropout: 0.0
  bias: true
  block_size: 2048
  n_layers: 24
  n_embd: 1024
  n_head: 16
optimization:
  lr: 0.0003
  weight_decay: 0.1
  warmup_pct: 0.01
  decay_pct: 0.01
  constant_pct: 0.02
  schedule: wsd_reset
  reset_optimizer: true
  lora:
    rank: 16
    alpha: 16.0
    target_modules:
    - kernel
training:
  batch_size: 512
  per_device_batch_size: -1
  tokens:
  - 7000000000
  - 6860000000
  - 140000000
  dataset:
  - - name: cfq
      rate: 1.0
      style: PADDED
      suffix: sparql
  - - name: cfq
      rate: 1.0
      style: PADDED
      suffix: text
  - - name: cfq
      rate: 1.0
      style: PADDED
  validation: false
  evaluate: true
  validation_steps: 2048
  skip_first_dataset_validation: false
  fade:
    overlap: 0.0
    curve: linear
eval:
  evaluations:
  - cfq
logging:
  report_interval: 32
  checkpoint_interval: 66
  validation_interval: 26
  wandb: true
job: continual/train/benchmark_lora
request:
  chip: h200
  min_chips: 4
  n_shards: 1
