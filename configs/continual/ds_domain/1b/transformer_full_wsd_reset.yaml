architecture:
  dtype:
    param: float32
    activation: bfloat16
  rope: true
  vocab_size: 100288
  dropout: 0.0
  bias: true
  block_size: 2048
  n_layers: 32
  n_embd: 1280
  n_head: 20
optimization:
  lr: 0.0003
  weight_decay: 0.1
  warmup_pct: 0.01
  decay_pct: 0.01
  constant_pct: 0.02
  schedule: wsd_reset
  reset_optimizer: true
training:
  batch_size: 512
  per_device_batch_size: -1
  tokens:
  - 10000000000
  - 10000000000
  dataset:
  - - name: fineweb
      rate: 1.0
      style: PMD
  - - name: pes2o
      rate: 1.0
      style: PMD
  validation: false
  evaluate: true
  validation_steps: 2048
  skip_first_dataset_validation: true
  fade:
    overlap: 0.1
    curve: cosine
eval:
  evaluations:
  - fineweb_ppl
  - pes2o
  - pile
  - tinystories
logging:
  report_interval: 32
  checkpoint_interval: 4096
  validation_interval: 1024
  wandb: true
job: continual/train/benchmark
request:
  chip: h200
  min_chips: 4
  n_shards: 1
