architecture:
  dtype:
    param: float32
    activation: bfloat16
  vocab_size: 100288
  dropout: 0.0
  block_size: 2048
  n_layers: 64
  n_embd: 1280
  d_state: 128
  d_conv: 4
  expand: 2
  n_groups: 1
  n_heads: -1
optimization:
  lr: 0.0003
  weight_decay: 0.1
  warmup_pct: 0.01
  decay_pct: 0.01
  constant_pct: 0.02
  schedule: cosine_rewarm
  reset_optimizer: false
training:
  batch_size: 512
  per_device_batch_size: -1
  tokens:
  - 19600000000
  - 100000000
  - 100000000
  - 100000000
  - 100000000
  dataset:
  - - name: fineweb
      rate: 1.0
      style: PMD
  - - name: mnli
      rate: 1.0
      style: PADDED
  - - name: qqp
      rate: 1.0
      style: PADDED
  - - name: sst2
      rate: 1.0
      style: PADDED
  - - name: siqa
      rate: 1.0
      style: PADDED
  validation: false
  evaluate: true
  validation_steps: 2048
  skip_first_dataset_validation: true
  fade:
    overlap: 0.1
    curve: cosine
eval:
  evaluations:
  - mnli
  - qqp
  - sst2
  - siqa
  - fineweb_ppl
logging:
  report_interval: 32
  checkpoint_interval: 47
  validation_interval: 19
  wandb: true
job: continual/train/benchmark_mamba
request:
  chip: h200
  min_chips: 4
  n_shards: 1
