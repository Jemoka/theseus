architecture:
  dtype:
    param: float32
    activation: bfloat16
  rope: true
  vocab_size: 100288
  dropout: 0.0
  bias: true
  block_size: 2048
  n_layers: 36
  n_embd: 1536
  n_head: 24
optimization:
  lr: 0.0003
  weight_decay: 0.1
  warmup_pct: 0.01
  decay_pct: 0.01
  constant_pct: 0.02
  schedule: cosine_rewarm
  reset_optimizer: false
training:
  batch_size: 512
  per_device_batch_size: -1
  tokens:
  - 39200000000
  - 200000000
  - 200000000
  - 200000000
  - 200000000
  dataset:
  - - name: fineweb
      rate: 1.0
      style: PMD
  - - name: mnli
      rate: 1.0
      style: PADDED
  - - name: qqp
      rate: 1.0
      style: PADDED
  - - name: sst2
      rate: 1.0
      style: PADDED
  - - name: siqa
      rate: 1.0
      style: PADDED
  validation: false
  evaluate: true
  validation_steps: 2048
  skip_first_dataset_validation: true
  fade:
    overlap: 0.1
    curve: cosine
eval:
  evaluations:
  - mnli
  - qqp
  - sst2
  - siqa
  - fineweb_ppl
logging:
  report_interval: 32
  checkpoint_interval: 4096
  validation_interval: 1024
  wandb: true
job: continual/train/benchmark
request:
  chip: h200
  min_chips: 4
  n_shards: 1
