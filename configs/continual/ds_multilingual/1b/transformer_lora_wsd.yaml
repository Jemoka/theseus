architecture:
  dtype:
    param: float32
    activation: bfloat16
  rope: true
  vocab_size: 100288
  dropout: 0.0
  bias: true
  block_size: 2048
  n_layers: 16
  n_embd: 2048
  n_head: 16
optimization:
  lr: 0.0003
  weight_decay: 0.1
  warmup_pct: 0.01
  decay_pct: 0.01
  constant_pct: 0.02
  schedule: wsd
  reset_optimizer: false
  lora:
    rank: 16
    alpha: 16.0
    target_modules:
    - kernel
training:
  batch_size: 512
  per_device_batch_size: -1
  tokens:
  - 6666666666
  - 6666666666
  - 6666666668
  dataset:
  - - name: ccaligned
      rate: 1.0
      style: PMD
      suffix: fr
  - - name: ccaligned
      rate: 1.0
      style: PMD
      suffix: de
  - - name: ccaligned
      rate: 1.0
      style: PMD
      suffix: zh
  validation: false
  evaluate: true
  validation_steps: 2048
  skip_first_dataset_validation: false
  fade:
    overlap: 0.0
    curve: linear
eval:
  evaluations:
  - ccaligned_fr_ppl
  - ccaligned_de_ppl
  - ccaligned_zh_ppl
logging:
  report_interval: 32
  checkpoint_interval: 1000000000
  validation_interval: 1271
  wandb: true
  plots:
    save: true
job: continual/train/benchmark_lora
request:
  chip: h200
  min_chips: 4
  n_shards: 1
