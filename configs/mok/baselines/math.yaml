architecture:
  backbone:
    implementation: qwen
    weights: Qwen/Qwen2.5-1.5B-Instruct
  dtype:
    param: float32
    activation: bfloat16
  block_size: 512
eval:
  evaluations: []
tokenizer:
  backend: huggingface
  name: Qwen/Qwen2.5-1.5B-Instruct
  huggingface:
    use_fast: true
    use_remote_code: false
optimization:
  weight_decay: 0.0
  beta1: 0.9
  beta2: 0.95
  ppo:
    beta: 0.1            # was 0.04 — stronger KL anchor to ref policy
    clip_eps: 0.2
    discount: 1.0
    sample_temperature: 1.0
    sample_top_p: 0.95   # was 1.0 — trims long tail that feeds reward hacking
  grpo:
    group_size: 8        # was 4 — better advantage estimates
  lr: 1.0e-6             # was 3e-4 — the main culprit
training:
  rl:
    components: ["arithmetic_goldengate"]
  batch_size: 512
  per_device_batch_size: 6
  tokens: 500000000
  warmup_pct: 0.05       # was 0.01 — gentler ramp
  decay_pct: 0.1
  validation: false
  evaluate: false
  dataset: []
  validation_steps: 2048
logging:
  report_interval: 1
  checkpoint_interval: 1024
  validation_interval: 100000
  wandb: true
job: qwen/rl/grpo
request:
  n_shards: 1
