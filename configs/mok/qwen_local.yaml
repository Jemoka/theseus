architecture:
  backbone:
    implementation: qwen
    weights: Qwen/Qwen2.5-1.5B-Instruct
  dtype:
    param: float32
    activation: float32
  block_size: 512
eval:
  evaluations: []
tokenizer:
  backend: huggingface
  name: Qwen/Qwen2.5-1.5B-Instruct
  huggingface:
    use_fast: true
    use_remote_code: false
optimization:
  weight_decay: 0.0
  beta1: 0.9
  beta2: 0.95
  ppo:
    beta: 0.1
    clip_eps: 0.2
    discount: 1.0
    sample_temperature: 1.0
    sample_top_p: 0.95
  grpo:
    group_size: 2
  lr: 1.0e-6
training:
  rl:
    components: ["alpaca_goldengate", "arithmetic_goldengate"]
  batch_size: 4
  per_device_batch_size: 2
  tokens: 10000
  warmup_pct: 0.05
  decay_pct: 0.1
  validation: false
  evaluate: false
  dataset: []
  validation_steps: 16
logging:
  report_interval: 1
  checkpoint_interval: 100
  validation_interval: 100
  wandb: false
job: qwen/rl/mok
request:
  n_shards: 1
