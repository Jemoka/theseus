architecture:
  backbone:
    implementation: qwen
    weights: Qwen/Qwen2.5-1.5B-Instruct
  dtype:
    param: float32
    activation: bfloat16
  block_size: 512
eval:
  evaluations: []
tokenizer:
  backend: huggingface
  name: Qwen/Qwen2.5-1.5B-Instruct
  huggingface:
    use_fast: true
    use_remote_code: false
optimization:
  weight_decay: 0.1
  beta1: 0.9
  beta2: 0.95
  ppo:
    beta: 0.04
    clip_eps: 0.2
    discount: 1.0
    sample_temperature: 1.0
    sample_top_p: 1.0
  grpo:
    group_size: 4
  lr: 0.0003
training:
  rl:
    components: ["alpaca_goldengate", "arithmetic_goldengate"]
  batch_size: 128
  per_device_batch_size: -1
  tokens: 100000000
  warmup_pct: 0.01
  decay_pct: 0.1
  validation: false
  evaluate: true
  dataset: []
  validation_steps: 2048
logging:
  report_interval: 1
  checkpoint_interval: 1024
  validation_interval: 100000
  wandb: false
job: qwen/rl/mok
request:
  n_shards: 1
