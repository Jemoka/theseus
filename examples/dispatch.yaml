mount: /mnt/juicefs-local  # local JuiceFS mount point used by `theseus repl --sync/--update`
# proxy: houjun@mailbox-host:/srv/theseus-root  # alternative mailbox transport via SCP (mutually exclusive with top-level mount)

# Host priority order for solver (first match wins)
priority:
  - workstation       # prefer local workstation
  - cpu-box           # dedicated plain CPU host
  - devbox            # then devbox
  - hpc-cpu           # dedicated SLURM CPU login
  - hpc-login         # then HPC cluster
  - cloud             # cloud as last resort

# Map chip names to SLURM GRES types (cluster-specific)
gres_mapping:
  h100: h100_80gb           # your cluster's GRES name for H100
  a100-sxm4-80gb: a100_80g  # GRES name for A100 80GB
  a100-pcie-40gb: a100_40g  # GRES name for A100 40GB

clusters:
  local:
    root: /data/theseus
    work: /tmp/theseus
    log: /var/log/theseus  # optional, defaults to {work}/logs

  gcp:
    root: /home/user/theseus-data      # paths on the TPU VM filesystem
    work: /home/user/theseus-work
    log: /home/user/theseus-logs

  hpc:
    root: /mnt/juicefs/theseus
    work: /scratch/theseus
    log: /scratch/theseus/logs
    share: /scratch/theseus/.dispatch  # shared dir for scripts (visible to all nodes)
    mount: redis://:password@redis.example.com:6379/0  # JuiceFS redis connection
    cache_size: 100G  # JuiceFS --cache-size
    cache_dir: /scratch/juicefs-cache  # JuiceFS --cache-dir

hosts:
  # Plain SSH host - direct GPU access, no scheduler
  workstation:
    ssh: gpu-workstation        # alias from ~/.ssh/config
    cluster: local
    type: plain
    chips:
      h100: 4
    uv_groups: [cuda12]         # uv sync --group cuda12

  devbox:
    ssh: devbox
    cluster: local
    type: plain
    chips:
      a100-sxm4-80gb: 8
    uv_groups: [cuda12, dev]

  # Plain SSH host - CPU-only host.
  # Leave chips empty/omitted to mark this as non-GPU.
  cpu-box:
    ssh: cpu-box
    cluster: local
    type: plain
    chips: {}
    uv_groups: [cpu]

  # SLURM CPU-focused login host.
  # For CPU jobs (n_chips: 0), solver uses cpu_partitions when provided.
  hpc-cpu:
    ssh: hpc
    cluster: hpc
    type: slurm
    partitions: [gpu]
    cpu_partitions: [cpu]
    account: myproject
    qos: normal
    uv_groups: [cpu]

  # SLURM cluster - jobs submitted via sbatch
  hpc-login:
    ssh: hpc
    cluster: hpc
    type: slurm
    partitions: [gpu, cpu]
    cpu_partitions: [cpu]
    account: myproject
    qos: normal
    mem: 64G                     # default memory per job (default: 64G if not set)
    exclude: [node001, node002]  # nodes to exclude (--exclude)
    uv_groups: [cuda12]

  # SLURM cluster with explicit chip allocation limits
  hpc-limited:
    ssh: hpc
    cluster: hpc
    type: slurm
    partitions: [gpu]
    account: myproject
    chips:                       # optional: limit allocation to these chips
      h100: 8                    # only use up to 8 H100s from this host
      a100-sxm4-80gb: 16        # only use up to 16 A100-80GBs
    uv_groups: [cuda12]

  cloud:
    ssh: cloud
    cluster: hpc
    type: slurm
    partitions: [a100, h100]
    uv_groups: [cuda11]         # older CUDA on this cluster

  # Google Cloud TPU VM - created/managed via gcloud CLI
  # The host name ('my-tpu-v4') is used as the TPU VM name in gcloud commands.
  my-tpu-v4:
    type: tpu
    cluster: gcp
    zone: us-central2-b         # GCP zone for TPU
    project: my-gcp-project     # GCP project (optional, uses gcloud default)
    accelerator_type: v4-32     # TPU type and size (4 hosts x 8 chips = 32)
    version: tpu-ubuntu2204-base  # TPU software version
    spot: true                  # use spot pricing (cheaper, may be preempted)
    # preemptible: false        # alternative to spot (24h time limit)
    # network: my-vpc           # VPC network (optional)
    # subnetwork: my-subnet     # VPC subnetwork (optional)
    # service_account: sa@proj.iam.gserviceaccount.com  # (optional)
    # internal_ip: false        # use internal IP for SSH (optional)
    # metadata:                 # instance metadata key-value pairs (optional)
    #   startup-script: "echo hello"
    uv_groups: [tpu]            # uv sync --group tpu
